name: Scan

on:
  schedule:
    # Offset from :00/:30 - GitHub's own docs warn that on-the-hour/half-hour
    # schedules hit peak load and are frequently delayed or dropped.
    - cron: "13,43 * * * *"  # every 30 minutes, at :13 and :43, UTC
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write   # needed to commit journal.jsonl back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Check journal outcomes
        run: python journal_check.py

      - name: Commit journal updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch journal.jsonl
          git add journal.jsonl
          git diff --cached --quiet || git commit -m "Update journal [skip ci]"
          git pull --rebase --autostash
          git push
