name: Scan

on:
  schedule:
    # As close to continuous as a scheduled job can get: every 15 minutes.
    # Offset from :00/:15/:30/:45 - GitHub's own docs warn that on-the-hour
    # schedules hit peak load and are frequently delayed or dropped.
    # NOTE: this cadence needs the repo to be public - a private repo only
    # gets 2,000 free Actions minutes/month, and a full scan run takes several
    # minutes, so 96 runs/day would blow through that budget in days. Public
    # repos get unlimited free minutes. (No secrets live in the code - the
    # bot token/chat id are GitHub encrypted secrets referenced via env:
    # below, never committed - so making this public doesn't expose them.)
    - cron: "3,18,33,48 * * * *"  # every 15 minutes, UTC
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write   # needed to commit journal.jsonl back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: Telegram   # secrets were saved as environment secrets under this name
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Check journal outcomes
        run: python journal_check.py

      - name: Commit journal updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch journal.jsonl
          git add journal.jsonl
          git diff --cached --quiet || git commit -m "Update journal [skip ci]"
          git pull --rebase --autostash
          git push
