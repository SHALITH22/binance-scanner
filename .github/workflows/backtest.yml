name: Backtest

on:
  schedule:
    - cron: "0 0 * * 0"  # weekly, Sunday 00:00 UTC - keeps detector weights current
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit backtest_results.json back to the repo

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run backtest (pairs/timeframes from settings.yaml)
        run: python backtest.py

      - name: Commit updated backtest results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest_results.json
          git diff --cached --quiet || git commit -m "Refresh backtest results [skip ci]"
          git push
